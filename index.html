<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>双选会企业报名系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Microsoft YaHei,PingFang SC,sans-serif;background:#f0f2f5;color:#333}
.header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:20px 30px}
.header h1{font-size:22px}
.nav-bar{display:flex;align-items:center;gap:10px}
.nav-bar a{color:#fff;text-decoration:none;padding:8px 16px;border-radius:4px}
.container{max-width:1200px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:8px;padding:20px;margin-bottom:20px}
.card h2{font-size:18px;border-bottom:2px solid #1a73e8;padding-bottom:10px}
table{width:100%;border-collapse:collapse}
th{background:#f5f5f5;padding:10px;border-bottom:2px solid #ddd}
td{padding:10px;border-bottom:1px solid #eee}
.btn{padding:8px 20px;border:none;border-radius:4px;cursor:pointer}
.btn-primary{background:#1a73e8;color:#fff}
.btn-success{background:#0f9d58;color:#fff}
.btn-danger{background:#e53935;color:#fff}
</style></head><body>
<div class="header"><div class="nav-bar">
<h1>双选会企业报名系统</h1>
<a href="index.html" class="active">报名管理</a>
<a href="summary.html">场次汇总</a>
</div></div>
<div class="container">
<div class="card">
<h2>新增报名</h2>
<form id="regForm">
<label>维护老师: <select id="teacher"></select></label><br>
<label>企业名称: <input type="text" id="company_name"></label><br>
<label>联系人: <input type="text" id="contact_person"></label><br>
<label>联系电话: <input type="text" id="contact_phone"></label><br>
<label>报名金额: <input type="number" id="price"></label><br>
<label>报名场次: <div id="sessionsList"></div></label><br>
<button type="submit" class="btn btn-primary">提交报名</button>
</form>
</div>
<div class="card">
<h2>报名列表</h2>
<table><thead><tr><th>维护老师</th><th>企业名称</th><th>联系人</th><th>电话</th><th>金额</th><th>报名场次</th><th>时间</th></tr></thead>
<tbody id="regTableBody"></tbody></table>
</div>
</div>
<script>
var SS = [{"id": 1, "name": "全国重点高校巡回招聘会", "city": "成都", "university": "四川大学（985/211/双一流）", "date": "9月7日（周一）14:30-17:30", "campus": "望江校区"}, {"id": 2, "name": "全国重点高校巡回招聘会", "city": "成都", "university": "电子科技大学（985/211/双一流）", "date": "9月8日（周二）9:30-12:00", "campus": "清水河校区"}];
var TT = ["张三", "李四", "王五"];
var SK="sx_data";
function gD(){try{return JSON.parse(localStorage.getItem(SK))||[]}catch(e){return[]}}
function sD(d){localStorage.setItem(SK,JSON.stringify(d))}
var SM={};SS.forEach(function(s){SM[s.id]=s});
function nw(){var d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1+"").padStart(2,"0")+"-"+d.getDate().toString().padStart(2,"0")+" "+d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0")}
function si(){TT.forEach(function(t){var o=document.createElement("option");o.value=t;o.textContent=t;document.getElementById("teacher").appendChild(o)});
var sl=document.getElementById("sessionsList");SS.forEach(function(s){var l=document.createElement("label");var c=document.createElement("input");c.type="checkbox";c.value=s.id;l.appendChild(c);l.appendChild(document.createTextNode(s.city+"-"+s.university));sl.appendChild(l)})}
document.getElementById("regForm").addEventListener("submit",function(e){e.preventDefault();var d={teacher:document.getElementById("teacher").value,company_name:document.getElementById("company_name").value,contact_person:document.getElementById("contact_person").value,contact_phone:document.getElementById("contact_phone").value,price:document.getElementById("price").value,selected_sessions:[]};
document.querySelectorAll("#sessionsList input:checked").forEach(function(cb){d.selected_sessions.push(parseInt(cb.value))});var r=gD();d.id=r.length?Math.max.apply(Math,r.map(function(x){return x.id}))+1:1;d.created_at=nw();r.unshift(d);sD(r);alert("提交成功");location.reload()})
function rn(){var r=gD();var tb=document.getElementById("regTableBody");tb.innerHTML="";r.forEach(function(x){var tr=document.createElement("tr");
tr.innerHTML="<td>"+(x.teacher||"")+"</td><td>"+(x.company_name||"")+"</td><td>"+(x.contact_person||"")+"</td><td>"+(x.contact_phone||"")+"</td><td>"+(x.price||"0")+"</td><td>"+sD2(x.selected_sessions)+"</td><td>"+(x.created_at||"")+"</td>";tb.appendChild(tr)})}
function sD2(sids){if(!sids||!sids.length)return"-";return sids.map(function(i){var s=SM[i];return s?s.city+"-"+s.university:i}).join("; ")}
si();rn();
</script></body></html>
